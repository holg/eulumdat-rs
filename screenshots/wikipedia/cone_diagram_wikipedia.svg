<svg viewBox="0 0 600 550" xmlns="http://www.w3.org/2000/svg" class="diagram-cone-wikipedia"><rect x="0" y="0" width="600" height="550" fill="#ffffff"/><text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">Beam Angle and Field Angle</text><text x="300" y="45" text-anchor="middle" font-size="12" fill="#64748b" font-family="system-ui, -apple-system, sans-serif">Light distribution from a luminaire</text><defs>
