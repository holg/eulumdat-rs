t x="45" y="260.0" text-anchor="middle" font-size="11" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif" transform="rotate(-90, 45, 260.0)">Mounting height: 3.0m</text><line x1="216.5" y1="450" x2="216.5" y2="480.0" stroke="#22c55e" stroke-width="1"/><line x1="383.5" y1="450" x2="383.5" y2="480.0" stroke="#22c55e" stroke-width="1"/><line x1="216.5" y1="475" x2="383.5" y2="475" stroke="#22c55e" stroke-width="2"/><text x="300" y="469.0" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif">Beam ⌀ 2.92m</text><line x1="113.0" y1="485.0" x2="113.0" y2="510.0" stroke="#f97316" stroke-width="1"/><line x1="487.0" y1="485.0" x2="487.0" y2="510.0" stroke="#f97316" stroke-width="1"/><line x1="113.0" y1="505" x2="487.0" y2="505" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/><text x="300" y="499.0" text-anchor="middle" font-size="10" fill="#f97316" font-family="system-ui, -apple-system, sans-serif">Field ⌀ 6.54m</text><rect x="15" y="60" width="180" height="78" fill="rgba(255,255,255,0.9)" stroke="#e2e8f0" stroke-width="1" rx="4"/><text x="23.0" y="76.0" font-size="11" font-weight="bold" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">Definitions (IES):</text><rect x="23.0" y="86.0" width="14" height="10" fill="rgba(34, 197, 94, 0.3)" stroke="#22c55e" stroke-width="1.5" rx="2"/><text x="43.0" y="94.0" font-size="10" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">Beam: I ≥ 50% of I_max</text><rect x="23.0" y="104.0" width="14" height="10" fill="rgba(249, 115, 22, 0.15)" stroke="#f97316" stroke-width="1.5" stroke-dasharray="3,1" rx="2"/><text x="43.0" y="112.0" font-size="10" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">Field: I ≥ 10% of I_max</text><text x="23.0" y="130.0" font-size="10" fill="#1e293b" font-family="system-ui, -apple-system, sans-serif">Classification: Spot</text><text x="300" y="538.0" text-anchor="middle" font-size="9" fill="#64748b" font-family="system-ui, -apple-system, sans-serif">Beam diameter = 2 × height × tan(beam_angle / 2)</text></svg>