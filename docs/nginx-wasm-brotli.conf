# Nginx configuration for serving WASM with Brotli/Gzip pre-compressed files
#
# This configuration serves pre-compressed .br and .gz files when available,
# which is more efficient than on-the-fly compression for large WASM files.
#
# Usage:
#   Include this in your server block or copy the relevant directives.
#
# Example server block:
#   server {
#       listen 80;
#       server_name eulumdat.example.com;
#       root /var/www/eulumdat/dist;
#       include /etc/nginx/conf.d/wasm-brotli.conf;
#   }

# Enable serving pre-compressed files
# When a request comes for /file.wasm, nginx will check for /file.wasm.br
# and serve it with Content-Encoding: br if the client accepts it.
gzip_static on;
brotli_static on;

# MIME types - ensure WASM is recognized
types {
    application/wasm wasm;
}

# Fallback: dynamic compression for files without pre-compressed versions
# (disabled for WASM since we pre-compress everything)
gzip on;
gzip_types text/plain text/css application/javascript application/json;
gzip_min_length 1000;

# Brotli dynamic compression (if ngx_brotli module is installed)
# brotli on;
# brotli_types text/plain text/css application/javascript application/json;

# Cache control for WASM files (they have content hashes, so cache forever)
location ~* \.(wasm|wasm\.br|wasm\.gz)$ {
    # Files with content hashes can be cached forever
    add_header Cache-Control "public, max-age=31536000, immutable";

    # CORS headers for cross-origin WASM loading
    add_header Access-Control-Allow-Origin "*";

    # Ensure correct content type
    default_type application/wasm;
}

# Cache control for JS files with content hashes
location ~* -[a-f0-9]{16}\.js$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
}

# Cache control for CSS files with content hashes
location ~* -[a-f0-9]{16}\.css$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# Don't cache index.html (so updates are picked up immediately)
location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
}

# Loader scripts (no hash, short cache)
location ~* (bevy-loader|typst-loader)\.js$ {
    add_header Cache-Control "public, max-age=3600";
    add_header Access-Control-Allow-Origin "*";
}

# ============================================================================
# IMPORTANT: brotli_static requires the ngx_brotli module
# ============================================================================
#
# Installation on Ubuntu/Debian:
#   sudo apt install libnginx-mod-brotli
#
# Installation on macOS (Homebrew):
#   brew install nginx
#   # Homebrew nginx includes brotli by default
#
# If brotli_static is not available, nginx will fall back to:
#   1. gzip_static (serves .gz files)
#   2. Uncompressed files
#
# To verify brotli is working:
#   curl -H "Accept-Encoding: br" -I http://localhost/app.wasm
#   # Should show: Content-Encoding: br
#
# ============================================================================

# ============================================================================
# Alternative: Cloudflare / CDN
# ============================================================================
#
# If using Cloudflare, Vercel, Netlify, or similar CDNs:
# - They automatically compress responses with Brotli/Gzip
# - Pre-compressed .br files may be served directly (varies by CDN)
# - No nginx configuration needed for compression
#
# Cloudflare: Enable "Brotli" in Speed > Optimization
# Vercel: Automatic
# Netlify: Automatic
#
# ============================================================================
