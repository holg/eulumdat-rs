# Nginx configuration for eulumdat.icu
#
# This serves the static WASM app with:
# - Brotli/Gzip pre-compressed files
# - Custom 404 page
# - Proper MIME types for WASM
# - Immutable caching for hashed files

server {
    listen 80;
    listen [::]:80;
    server_name eulumdat.icu www.eulumdat.icu;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eulumdat.icu www.eulumdat.icu;

    # SSL certificates (adjust paths for your setup)
    ssl_certificate /etc/letsencrypt/live/eulumdat.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eulumdat.icu/privkey.pem;

    # Document root
    root /var/www/eulumdat.icu;
    index index.html;

    # Enable serving pre-compressed .br and .gz files
    gzip_static on;
    brotli_static on;

    # MIME types
    types {
        application/wasm wasm;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Secret path for PDF/Typst export (serves the special HTML)
    location = /htr_pdf_typ_test_almost_secret {
        try_files /htr_pdf_typ_test_almost_secret.html =404;
    }

    # WASM files - long cache, immutable
    location ~* \.wasm(\.br|\.gz)?$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        default_type application/wasm;
    }

    # JS/CSS files with content hashes - long cache, immutable
    location ~* -[a-f0-9]{16}\.(js|css)(\.br|\.gz)?$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Loader scripts (no hash) - short cache
    location ~* (bevy-loader|typst-loader)\.js$ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
    }

    # HTML files - no cache (for immediate updates)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Main routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bevy and Typst subdirectories
    location /bevy/ {
        add_header Access-Control-Allow-Origin "*";
    }
    location /typst/ {
        add_header Access-Control-Allow-Origin "*";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ============================================================================
# INSTALLATION NOTES
# ============================================================================
#
# 1. Install brotli module for nginx:
#    Ubuntu/Debian: sudo apt install libnginx-mod-brotli
#
# 2. Copy this file:
#    sudo cp nginx-eulumdat.icu.conf /etc/nginx/sites-available/eulumdat.icu
#    sudo ln -s /etc/nginx/sites-available/eulumdat.icu /etc/nginx/sites-enabled/
#
# 3. Get SSL certificate:
#    sudo certbot --nginx -d eulumdat.icu -d www.eulumdat.icu
#
# 4. Deploy files:
#    rsync -avz --delete dist/ user@server:/var/www/eulumdat.icu/
#
# 5. Test and reload:
#    sudo nginx -t && sudo systemctl reload nginx
#
# ============================================================================
